<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Umzugs-Checkliste · Moltkestraße → Wartbergstraße</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Fraunces:ital,wght@0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f6f2ec;
    --bg-warm: #ede7dd;
    --surface: #ffffff;
    --ink: #1b2a3d;
    --ink-soft: #5a6a7a;
    --ink-muted: #94a1af;
    --accent-deep: #1b3a4b;
    --accent-teal: #0d7c66;
    --accent-teal-soft: #e6f5f1;
    --accent-gold: #c8963e;
    --accent-gold-soft: #fdf5e8;
    --accent-plum: #6c3461;
    --accent-plum-soft: #f5eaf3;
    --accent-rust: #b44d2d;
    --accent-rust-soft: #fceee8;
    --accent-slate: #3d5467;
    --accent-slate-soft: #eaeff3;
    --accent-forest: #1e8449;
    --accent-forest-soft: #eafaf1;
    --border: #e2dbd1;
    --radius: 12px;
    --shadow: 0 1px 3px rgba(27,42,61,0.06), 0 6px 24px rgba(27,42,61,0.04);
    --shadow-lg: 0 4px 12px rgba(27,42,61,0.08), 0 16px 48px rgba(27,42,61,0.06);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Texture overlay ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
    z-index: 9999;
  }

  .container { max-width: 780px; margin: 0 auto; padding: 0 20px 60px; }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, var(--accent-deep) 0%, #0f2630 55%, var(--accent-teal) 100%);
    padding: 40px 24px 28px;
    color: white;
    position: relative;
    overflow: hidden;
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -40px; right: -40px;
    width: 160px; height: 160px;
    border-radius: 50%;
    background: rgba(13,124,102,0.15);
  }
  .header-inner { max-width: 780px; margin: 0 auto; position: relative; z-index: 1; }
  .header h1 {
    font-family: 'Fraunces', serif;
    font-weight: 800;
    font-size: 2rem;
    letter-spacing: -0.5px;
    line-height: 1.1;
  }
  .header .route {
    margin-top: 6px;
    font-size: 0.9rem;
    opacity: 0.8;
    font-weight: 300;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .header .route .arrow {
    display: inline-block;
    width: 28px;
    height: 2px;
    background: var(--accent-teal);
    position: relative;
    border-radius: 1px;
  }
  .header .route .arrow::after {
    content: '';
    position: absolute;
    right: -1px;
    top: -3px;
    border: solid var(--accent-teal);
    border-width: 0 2px 2px 0;
    padding: 3px;
    transform: rotate(-45deg);
  }
  .header .people { font-size: 0.8rem; opacity: 0.5; margin-top: 4px; font-style: italic; }

  /* ── Progress ── */
  .progress-section {
    max-width: 780px;
    margin: -16px auto 0;
    padding: 0 20px;
    position: relative;
    z-index: 2;
  }
  .progress-card {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .progress-ring-wrap { position: relative; flex-shrink: 0; }
  .progress-ring { transform: rotate(-90deg); }
  .progress-ring-bg { fill: none; stroke: var(--border); stroke-width: 6; }
  .progress-ring-fill {
    fill: none;
    stroke: url(#progressGrad);
    stroke-width: 6;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.7s cubic-bezier(0.4,0,0.2,1);
  }
  .progress-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .progress-pct { font-weight: 800; font-size: 1.3rem; color: var(--accent-teal); line-height: 1; }
  .progress-info { flex: 1; }
  .progress-label { font-weight: 600; font-size: 0.95rem; }
  .progress-sub { font-size: 0.8rem; color: var(--ink-muted); margin-top: 2px; }
  .progress-bar-wrap { margin-top: 10px; height: 6px; background: var(--bg-warm); border-radius: 3px; overflow: hidden; }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-teal), var(--accent-gold));
    border-radius: 3px;
    transition: width 0.6s ease;
  }

  /* ── Filter ── */
  .filter-bar { margin-top: 20px; }
  .search-box {
    position: relative;
    margin-bottom: 12px;
  }
  .search-box input {
    width: 100%;
    padding: 11px 16px 11px 40px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.9rem;
    background: var(--surface);
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box input:focus { border-color: var(--accent-teal); }
  .search-box .icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.85rem;
    opacity: 0.4;
  }
  .search-box .clear {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    font-size: 0.85rem;
    color: var(--ink-muted);
    display: none;
  }
  .search-box.has-value .clear { display: block; }

  .cat-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .cat-pill {
    padding: 5px 13px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    font-family: 'Outfit', sans-serif;
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .cat-pill:hover { border-color: var(--accent-teal); color: var(--accent-teal); }
  .cat-pill.active {
    background: var(--accent-deep);
    color: white;
    border-color: var(--accent-deep);
  }

  /* ── Phase cards ── */
  .phase {
    margin-top: 16px;
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    animation: fadeSlideUp 0.4s ease both;
  }
  .phase:nth-child(2) { animation-delay: 0.05s; }
  .phase:nth-child(3) { animation-delay: 0.1s; }
  .phase:nth-child(4) { animation-delay: 0.15s; }
  .phase:nth-child(5) { animation-delay: 0.2s; }
  .phase:nth-child(6) { animation-delay: 0.25s; }

  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .phase-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
    border: none;
    background: none;
    width: 100%;
    font-family: 'Outfit', sans-serif;
    color: var(--ink);
    text-align: left;
  }
  .phase-header:hover { background: rgba(0,0,0,0.015); }
  .phase-header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .phase-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    flex-shrink: 0;
  }
  .phase-title { font-weight: 700; font-size: 0.95rem; }
  .phase-count { font-size: 0.75rem; color: var(--ink-muted); margin-top: 1px; }
  .phase-header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .phase-mini-bar {
    width: 56px;
    height: 4px;
    border-radius: 2px;
    background: var(--bg-warm);
    overflow: hidden;
  }
  .phase-mini-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s ease;
  }
  .phase-chevron {
    font-size: 1rem;
    color: var(--ink-muted);
    transition: transform 0.25s ease;
    line-height: 1;
  }
  .phase.open .phase-chevron { transform: rotate(180deg); }
  .phase.done .phase-header { background: var(--accent-forest-soft); }

  .phase-body { display: none; border-top: 1px solid var(--bg-warm); }
  .phase.open .phase-body { display: block; }

  /* ── Tasks ── */
  .task {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 13px 20px 13px 24px;
    border-bottom: 1px solid #f7f3ee;
    cursor: pointer;
    transition: background 0.15s, opacity 0.2s;
  }
  .task:last-child { border-bottom: none; }
  .task:hover { background: rgba(0,0,0,0.012); }
  .task.checked { opacity: 0.5; }

  .task-check {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    border: 2px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    margin-top: 1px;
  }
  .task.checked .task-check {
    border-color: var(--accent-teal);
    background: var(--accent-teal);
  }
  .task-check svg { opacity: 0; transition: opacity 0.15s; }
  .task.checked .task-check svg { opacity: 1; }

  .task-content { flex: 1; min-width: 0; }
  .task-text {
    font-size: 0.88rem;
    line-height: 1.45;
    transition: text-decoration 0.2s;
  }
  .task.checked .task-text { text-decoration: line-through; color: var(--ink-muted); }
  .task-cat {
    display: inline-block;
    font-size: 0.68rem;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 5px;
    margin-top: 4px;
    white-space: nowrap;
  }

  /* ── Footer ── */
  .footer {
    margin-top: 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }
  .footer-text { font-size: 0.75rem; color: var(--ink-muted); }
  .reset-btn {
    padding: 8px 18px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.8rem;
    color: var(--ink-muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .reset-btn:hover { border-color: var(--accent-rust); color: var(--accent-rust); }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .header { padding: 28px 20px 24px; }
    .header h1 { font-size: 1.6rem; }
    .progress-card { flex-direction: column; text-align: center; gap: 12px; }
    .task { padding: 11px 16px 11px 20px; }
    .task-cat { display: none; }
    .cat-pills { gap: 4px; }
    .cat-pill { font-size: 0.7rem; padding: 4px 10px; }
  }

  /* ── Confetti ── */
  @keyframes confettiFall {
    0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
    100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
  }
  .confetti-piece {
    position: fixed;
    top: 0;
    width: 8px;
    height: 8px;
    z-index: 10000;
    pointer-events: none;
    border-radius: 2px;
  }
</style>
</head>

    fill:"#3d5467",
    tasks:[
      {id:"f1",text:"Amazon, Lieferando, etc.: Lieferadressen aktualisieren",cat:"Online"},
      {id:"f2",text:"ImmobilienScout24 Profil: Mietgesuch deaktivieren / aktualisieren",cat:"Online"},
      {id:"f3",text:"Krankenkasse: Adressänderung melden",cat:"Versicherung"},
      {id:"f4",text:"Arzt, Zahnarzt, Apotheke: Ggf. neue Praxen in der Nähe suchen",cat:"Gesundheit"},
      {id:"f5",text:"ADAC / Automobilclub: Adresse ändern",cat:"Versicherung"},
      {id:"f6",text:"Fitnessstudio: Adressänderung (oder neues Studio suchen)",cat:"Freizeit"},
      {id:"f7",text:"Freunde & Familie: Neue Adresse mitteilen",cat:"Soziales"},
      {id:"f8",text:"Briefkasten Wartbergstraße 8.1 beschriften (Dahlmeyer / Boucek)",cat:"Wohnung"},
      {id:"f9",text:"Einweihungsparty planen 🎉",cat:"Soziales"}
    ]
  }
];

const CAT_COLORS = {
  Vertrag:["#c0392b","#fdecea"], Planung:["#2980b9","#e8f4fd"], Vorbereitung:["#8e44ad","#f3e8f9"],
  Behörden:["#d35400","#fef0e6"], Versorger:["#16a085","#e6f7f3"], Versicherung:["#2c3e50","#eaeff3"],
  Finanzen:["#27ae60","#e8f8ee"], Packen:["#f39c12","#fef9eb"], Wohnung:["#1abc9c","#e6faf6"],
  "IT/Büro":["#3498db","#e8f2fd"], Umzug:["#e74c3c","#fdecec"], Business:["#0e6655","#e6f5f1"],
  Online:["#7d3c98","#f3eaf8"], Gesundheit:["#e84393","#fdeaf4"], Freizeit:["#00b894","#e6faf3"],
  Soziales:["#fd79a8","#feeaf2"]
};

const CATEGORIES = ["Alle","Vertrag","Planung","Vorbereitung","Behörden","Versorger","Versicherung","Finanzen","Packen","Wohnung","IT/Büro","Umzug","Business","Online","Gesundheit","Freizeit","Soziales"];

// State
let checked = JSON.parse(localStorage.getItem('umzug_checked') || '{}');
let activeFilter = "Alle";
let searchTerm = "";
let openPhases = {};
PHASES.forEach(p => openPhases[p.id] = true);

function save() { localStorage.setItem('umzug_checked', JSON.stringify(checked)); }

function totalDone() { return Object.values(checked).filter(Boolean).length; }
function totalAll() { return PHASES.reduce((s,p) => s + p.tasks.length, 0); }

function updateProgress() {
  const done = totalDone(), all = totalAll();
  const pct = all > 0 ? (done / all) * 100 : 0;
  const circ = 188.5;
  document.getElementById('ringFill').style.strokeDashoffset = circ - (circ * pct / 100);
  document.getElementById('pctText').textContent = Math.round(pct) + '%';
  document.getElementById('progressLabel').textContent = done + ' von ' + all + ' erledigt';
  document.getElementById('progressBar').style.width = pct + '%';

  const sub = document.getElementById('progressSub');
  if (pct === 0) sub.textContent = "Los geht's!";
  else if (pct < 25) sub.textContent = "Guter Start!";
  else if (pct < 50) sub.textContent = "Läuft gut – weiter so!";
  else if (pct < 75) sub.textContent = "Über die Hälfte geschafft!";
  else if (pct < 100) sub.textContent = "Fast fertig – Endspurt!";
  else {
    sub.textContent = "🎉 Willkommen in der Wartbergstraße!";
    launchConfetti();
  }
}

function toggleTask(id) {
  checked[id] = !checked[id];
  save();
  render();
}

function togglePhase(phaseId) {
  openPhases[phaseId] = !openPhases[phaseId];
  render();
}

function render() {
  updateProgress();
  const container = document.getElementById('phaseList');
  container.innerHTML = '';

  PHASES.forEach(phase => {
    const tasks = phase.tasks.filter(t => {
      const catOk = activeFilter === "Alle" || t.cat === activeFilter;
      const searchOk = !searchTerm || t.text.toLowerCase().includes(searchTerm.toLowerCase());
      return catOk && searchOk;
    });
    if (tasks.length === 0) return;

    const doneCount = tasks.filter(t => checked[t.id]).length;
    const allDone = doneCount === tasks.length;
    const isOpen = openPhases[phase.id];

    const el = document.createElement('div');
    el.className = 'phase' + (isOpen ? ' open' : '') + (allDone ? ' done' : '');

    el.innerHTML = `
      <button class="phase-header" onclick="togglePhase('${phase.id}')">
        <div class="phase-header-left">
          <div class="phase-icon" style="background:${phase.soft}">${phase.icon}</div>
          <div>
            <div class="phase-title">${phase.label}</div>
            <div class="phase-count">${doneCount}/${tasks.length} erledigt${allDone ? ' ✅' : ''}</div>
          </div>
        </div>
        <div class="phase-header-right">
          <div class="phase-mini-bar">
            <div class="phase-mini-bar-fill" style="width:${(doneCount/tasks.length)*100}%;background:${phase.fill}"></div>
          </div>
          <span class="phase-chevron">▾</span>
        </div>
      </button>
      <div class="phase-body">
        ${tasks.map(t => {
          const done = checked[t.id];
          const cc = CAT_COLORS[t.cat] || ['#999','#f5f5f5'];
          return `<div class="task${done ? ' checked' : ''}" onclick="toggleTask('${t.id}')">
            <div class="task-check">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M3 7.5L5.5 10L11 4" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div class="task-content">
              <div class="task-text">${t.text}</div>
              <span class="task-cat" style="background:${cc[1]};color:${cc[0]}">${t.cat}</span>
            </div>
          </div>`;
        }).join('')}
      </div>
    `;
    container.appendChild(el);
  });
}

// Category pills
function renderCatPills() {
  const wrap = document.getElementById('catPills');
  wrap.innerHTML = CATEGORIES.map(c =>
    `<button class="cat-pill${activeFilter === c ? ' active' : ''}" onclick="setFilter('${c}')">${c}</button>`
  ).join('');
}

function setFilter(cat) {
  activeFilter = cat;
  renderCatPills();
  render();
}

// Search
const searchInput = document.getElementById('searchInput');
const searchBox = document.getElementById('searchBox');
searchInput.addEventListener('input', () => {
  searchTerm = searchInput.value;
  searchBox.classList.toggle('has-value', !!searchTerm);
  render();
});
document.getElementById('searchClear').addEventListener('click', () => {
  searchInput.value = '';
  searchTerm = '';
  searchBox.classList.remove('has-value');
  render();
});

// Reset
document.getElementById('resetBtn').addEventListener('click', () => {
  if (confirm('Wirklich alle Häkchen zurücksetzen?')) {
    checked = {};
    save();
    render();
  }
});

// Confetti
let confettiLaunched = false;
function launchConfetti() {
  if (confettiLaunched) return;
  confettiLaunched = true;
  const colors = ['#0d7c66','#c8963e','#1b3a4b','#6c3461','#e74c3c','#3498db','#27ae60'];
  for (let i = 0; i < 60; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + 'vw';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.width = (4 + Math.random() * 8) + 'px';
    piece.style.height = (4 + Math.random() * 8) + 'px';
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    piece.style.animation = `confettiFall ${2 + Math.random() * 2}s ease-in ${Math.random() * 1.5}s forwards`;
    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), 5000);
  }
  setTimeout(() => confettiLaunched = false, 6000);
}

// Init
renderCatPills();
render();
</script>
</body>
</html>
